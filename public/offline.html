<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillBridge offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.3), transparent 30%),
          radial-gradient(circle at 80% 30%, rgba(147, 51, 234, 0.24), transparent 30%),
          #030712;
        color: white;
        padding: 24px;
      }

      main {
        max-width: 560px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 28px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
      }

      h1 {
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
        margin: 0 0 18px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SkillBridge offline</h1>
      <p>
        Voce esta sem conexao. Se o site ja foi aberto antes neste dispositivo,
        volte para a pagina inicial para acessar a versao em cache.
      </p>
    </main>
  </body>
</html>
